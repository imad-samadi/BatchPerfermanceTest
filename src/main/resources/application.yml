spring:

  application:
    name: "batchDemo"


  datasource:
    url: jdbc:postgresql://localhost:5433/smallData     #testPerforV2
    username: postgres
    password: imad
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: true




  main:
    web-application-type: none

app:
  job :
    name : FaultTolerance        # multiThreadedJob asyncProcessingJob
batch:
  partition-size: 8
